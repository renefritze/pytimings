on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

name: pytest
jobs:
  py-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.py }})
    strategy:
      fail-fast: false
      matrix:
        config:
        - {os: windows-2022, py: '3.13'}
        - {os: macOS-14, py: '3.13'}
        - {os: ubuntu-24.04, py: '3.13'}

    env:
      OS: ${{ matrix.config.os }}
      PYTHON: ${{ matrix.config.py }}
    steps:
    - name: Cancel Previous Runs
      uses: styfle/cancel-workflow-action@0.13.1
      with:
        access_token: ${{ github.token }}
    - name: Checkout
      uses: actions/checkout@v7
      with:
        # fetch full history so hatch-vcs can derive the version from the last tag
        fetch-depth: 0
    - name: Setup uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.config.py }}
        enable-cache: true
    - name: Install dependencies
      run: uv sync --frozen --extra full
    - name: run mypy
      if: contains(matrix.config.os, 'ubuntu')
      run: uv run --frozen mypy pytimings
    - name: run pytest
      run: uv run --frozen pytest
    - name: "Upload coverage"
      uses: codecov/codecov-action@v7
      with:
        env_vars: OS,PYTHON
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: build docs
      # RTD builds on linux too
      if: contains(matrix.config.os, 'ubuntu')
      run: uv run --frozen make -C docs html
